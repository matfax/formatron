name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test-core:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-python@v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - name: Install test dependencies
        run: pip install .[test]
      - name: Run basic test suite
        run: pytest --snapshot-warn-unused

  doc-build:
    if: github.event_name == 'push'
    needs: [test-core]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-python@v6.3.0
        with:
          python-version: '3.11'
      - name: Install docs dependencies
        run: pip install .[docs]
      - name: Doxygen Deploy Action
        uses: Dan-Wanna-M/doxygen-github-pages-action@v0.1.9
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: gh-pages
          folder: docs/dev/html
          config_file: Doxyfile
          target_folder: dev/
          pre_build: |
            chmod +x docs/header_gen.sh
            ./docs/header_gen.sh
            chmod +x py_filter.sh
            export VERSION="dev"
            echo "PROJECT_NUMBER = $VERSION" >> Doxyfile
